# Render.com Deployment Configuration
# Docker-based deployment for OneX CRM backend

services:
  - type: web
    name: onex-crm-webhook
    runtime: docker
    plan: free
    region: singapore
    
    # Environment variables (configure in Render dashboard)
    env:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    
    # Auto-deploy on GitHub push
    autoDeploy: true
    
    # Health check
    healthCheckPath: /api/admin/health
    
    # Docker configuration
    dockerfile: Dockerfile
    
    # Restart policy
    restartPolicyType: on_failure
