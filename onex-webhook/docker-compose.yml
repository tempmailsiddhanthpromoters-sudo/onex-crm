# ─────────────────────────────────────────────────────────────────────
# docker-compose.yml — OneX 99acres Webhook Stack
# ─────────────────────────────────────────────────────────────────────
# Services:
#   app      – Node.js webhook server (port 3000, internal only)
#   nginx    – Reverse proxy with SSL termination (ports 80 + 443)
#   certbot  – Let's Encrypt auto-renewal every 12 hours
# ─────────────────────────────────────────────────────────────────────

version: '3.8'

services:
  # ── Node.js Application ──────────────────────────────────────────
  app:
    build: .
    container_name: onex-99acres-webhook
    restart: unless-stopped
    # Only expose to localhost — nginx handles external traffic
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    volumes:
      # Persist SQLite database and log files across container restarts
      - app-data:/app/data
      - app-logs:/app/logs
    environment:
      - NODE_ENV=production

  # ── Nginx Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: onex-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      - app

  # ── Certbot (Let's Encrypt) ─────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: onex-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    # Check for renewal every 12 hours (only renews if < 30 days left)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

# ── Named volumes for data persistence ─────────────────────────────
volumes:
  app-data:
  app-logs:
  certbot-www:
  certbot-conf:
