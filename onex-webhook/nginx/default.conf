# ─────────────────────────────────────────────────────────────────────
# Nginx — Reverse Proxy with SSL (Let's Encrypt)
# ─────────────────────────────────────────────────────────────────────
# Replace every occurrence of YOUR_DOMAIN with your actual domain name
# (e.g., webhook.onexcrm.com) before deploying.
# ─────────────────────────────────────────────────────────────────────

# Upstream — the Node.js container
upstream app_backend {
    server app:3000;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN;
    server_tokens off;

    # Let's Encrypt ACME challenge (needed for initial cert + renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — main server block ──────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;
    server_tokens off;

    # ── SSL certificates (managed by certbot) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # ── Modern SSL settings ────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ───────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # ── Proxy to Node.js app ───────────────────────────────────────
    location / {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running webhook responses
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
    }
}
